# Customer Success FTE - Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-success-worker
  namespace: customer-success
  labels:
    app: customer-success-fte
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-success-fte
      component: worker
  template:
    metadata:
      labels:
        app: customer-success-fte
        component: worker
    spec:
      serviceAccountName: customer-success-sa
      containers:
        - name: worker
          image: customer-success-fte:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - production/workers/message_processor.py
          envFrom:
            - configMapRef:
                name: customer-success-config
            - secretRef:
                name: customer-success-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - pgrep
                - -f
                - message_processor.py
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}
---
# Worker Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: customer-success-worker-hpa
  namespace: customer-success
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customer-success-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
