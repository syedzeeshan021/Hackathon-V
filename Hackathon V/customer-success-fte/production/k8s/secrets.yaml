# Customer Success FTE - Kubernetes Secrets
# IMPORTANT: In production, use external secrets manager (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: customer-success-secrets
  namespace: customer-success
  labels:
    app: customer-success-fte
type: Opaque
stringData:
  # Database
  DB_PASSWORD: "change-me-in-production"

  # OpenAI
  OPENAI_API_KEY: "sk-your-openai-api-key-here"
  OPENAI_MODEL: "gpt-4o"
  OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"

  # Gmail OAuth (if using)
  GMAIL_CLIENT_ID: "your-gmail-client-id"
  GMAIL_CLIENT_SECRET: "your-gmail-client-secret"

  # Twilio (if using WhatsApp)
  TWILIO_ACCOUNT_SID: "AC-your-account-sid"
  TWILIO_AUTH_TOKEN: "your-auth-token"
  TWILIO_WHATSAPP_NUMBER: "whatsapp:+14155238886"

  # API Security
  API_SECRET_KEY: "your-secret-key-for-api"
