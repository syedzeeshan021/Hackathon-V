# Customer Success FTE - Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: customer-success-sa
  namespace: customer-success
  labels:
    app: customer-success-fte
---
# Role for basic pod operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: customer-success-role
  namespace: customer-success
  labels:
    app: customer-success-fte
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
# Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: customer-success-rb
  namespace: customer-success
  labels:
    app: customer-success-fte
subjects:
  - kind: ServiceAccount
    name: customer-success-sa
    namespace: customer-success
roleRef:
  kind: Role
  name: customer-success-role
  apiGroup: rbac.authorization.k8s.io
