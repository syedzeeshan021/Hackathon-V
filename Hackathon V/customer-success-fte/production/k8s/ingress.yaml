# Customer Success FTE - Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: customer-success-ingress
  namespace: customer-success
  labels:
    app: customer-success-fte
  annotations:
    # NGINX Ingress
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst: "200"

    # CORS (for web form)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"

    # SSL certificate (replace with your own)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.customer-success.example.com
        - webhooks.customer-success.example.com
      secretName: customer-success-tls
  rules:
    - host: api.customer-success.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-success-api-service
                port:
                  number: 80
    - host: webhooks.customer-success.example.com
      http:
        paths:
          - path: /webhooks/gmail
            pathType: Exact
            backend:
              service:
                name: customer-success-api-service
                port:
                  number: 80
          - path: /webhooks/whatsapp
            pathType: Exact
            backend:
              service:
                name: customer-success-api-service
                port:
                  number: 80
          - path: /webhooks/web-form
            pathType: Exact
            backend:
              service:
                name: customer-success-api-service
                port:
                  number: 80
